services:
  - type: web
    name: bigqueryis-web
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: GUNICORN_WORKERS
        value: "1"
      - key: LOW_MEMORY_MODE
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: OPENALEX_API_KEY
        sync: false
