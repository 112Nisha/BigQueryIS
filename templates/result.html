<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tree Result</title>
    <style>
      :root {
        --bg: #0b1320;
        --panel: #111a2b;
        --panel-soft: #16223a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --border: #334155;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 15% 20%, #0f172a, #020617 55%);
        color: var(--text);
        font-family: "Sora", "Segoe UI", sans-serif;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .topbar {
        background: color-mix(in srgb, var(--panel) 85%, black);
        border-bottom: 1px solid var(--border);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .pill {
        border: 1px solid var(--border);
        background: var(--panel-soft);
        color: var(--text);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 0.88rem;
        font-weight: 700;
      }
      .pill.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
      }
      .spacer {
        flex: 1;
      }
      .muted {
        color: var(--muted);
        font-size: 0.85rem;
      }
      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        background: white;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="pill" href="{{ url_for('index') }}">Back to start</a>

      {% if job.has_reference %}
      <a
        class="pill {% if active_view == 'reference_tree.html' %}active{% endif %}"
        href="{{ url_for('job_result', job_id=job.id, view='reference_tree.html') }}"
      >
        Reference Tree
      </a>
      {% endif %}

      {% if job.has_citation %}
      <a
        class="pill {% if active_view == 'citation_tree.html' %}active{% endif %}"
        href="{{ url_for('job_result', job_id=job.id, view='citation_tree.html') }}"
      >
        Citation Tree
      </a>
      {% endif %}

      <a class="pill" target="_blank" rel="noreferrer" href="{{ active_view_url }}">Open current view in new tab</a>
      <span class="spacer"></span>
      <span class="muted">Job {{ job.id }}</span>
    </header>

    <iframe title="Generated Tree" src="{{ active_view_url }}"></iframe>
  </body>
</html>
